version: "3.9"

services:
  csv-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - /home/csv-server/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
